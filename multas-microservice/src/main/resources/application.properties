spring.application.name=multas-microservice

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/db_multas
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JPA configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Server configuration
server.servlet.context-path=/api
server.port=8087

# Logging configuration
logging.level.org.springframework=INFO
logging.level.cl.duoc.multas_microservice=DEBUG
logging.file.name=logs/multas-microservice.log

# JWT Configuration
jwt.secret=a13644aa2a98114a0e84b4c35821263fd546c9e8fbeb73ccfc4dbbc68d530ed35bdd0df7ea742cd2c720ff20532addb20f1dbc092aa0636cae0da83b7ebcbc64

# Microservices URLs
services.usuarios.baseUrl=http://localhost:8081/api/usuarios
services.prestamos.baseUrl=http://localhost:8089/api/prestamos
