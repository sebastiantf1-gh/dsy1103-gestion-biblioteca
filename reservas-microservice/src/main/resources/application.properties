spring.application.name=reservas-microservice

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/db_reservas
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JPA configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Server configuration
server.port=8083
server.servlet.context-path=/api

# Logging configuration
logging.level.org.springframework=INFO
logging.level.cl.duoc.reservas_microservice=DEBUG
logging.file.name=logs/reservas-microservice.log

# JWT Configuration
jwt.secret=a13644aa2a98114a0e84b4c35821263fd546c9e8fbeb73ccfc4dbbc68d530ed35bdd0df7ea742cd2c720ff20532addb20f1dbc092aa0636cae0da83b7ebcbc64

# Configuraciˇn de URLs de Microservicios Remotos (Para tus WebClient)
# (Ajusta los puertos si tus servicios de usuarios y libros corren en otros diferentes)
services.usuarios.baseUrl=http://localhost:8081/api/v1/usuarios
services.libros.baseUrl=http://localhost:8082/api/v1/libros