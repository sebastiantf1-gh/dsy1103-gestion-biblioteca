spring:
  application:
    name: reservas-microservice

  # Configuracion de Base de Datos
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:db_reservas}?allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Configuracion de Migraciones con Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Configuracion de Hibernate / JPA
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

# Configuracion del Servidor
server:
  port: 8090
  servlet:
    context-path: /api

# Swagger UI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Configuracion de Logs
logging:
  level:
    org.springframework: INFO
    cl.duoc.reservas_microservice: DEBUG

# Configuracion Seguridad JWT (Clave compartida con Autenticacion)
jwt:
  secret: a13644aa2a98114a0e84b4c35821263fd546c9e8fbeb73ccfc4dbbc68d530ed35bdd0df7ea742cd2c720ff20532addb20f1dbc092aa0636cae0da83b7ebcbc64

# Configuraci�n de Clientes Remotos (Exclusivo de Reservas para WebClient)
services:
  usuarios:
    # Si corre en Docker usa el nombre de red del contenedor 'usuarios-microservice', sino 'localhost'
    baseUrl: ${USUARIOS_SERVICE_API_URL:http://localhost:8081/api/usuarios}
  libros:
    baseUrl: ${LIBROS_SERVICE_API_URL:http://localhost:8085/api/libros}