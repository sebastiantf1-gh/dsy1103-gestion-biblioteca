spring:
  application:
    name: generos-microservice

# Database configuration
  datasource:
    url: jdbc:mysql://localhost:3306/db_generos
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Flyway configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # JPA configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

# Server configuration
server:
  port: 8083
  servlet:
    context-path: /api

# Logging configuration
logging:
  level:
    org.springframework: INFO
    cl.duoc.dsy1103.generos_microservice: DEBUG
  file:
    name: logs/generos-microservice.log

# JWT configuration
jwt:
  secret: a13644aa2a98114a0e84b4c35821263fd546c9e8fbeb73ccfc4dbbc68d530ed35bdd0df7ea742cd2c720ff20532addb20f1dbc092aa0636cae0da83b7ebcbc64

# Swagger
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true