spring.application.name=usuarios-microservice

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/db_usuarios
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Flyway configuration
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Server configuration
server.port=8081

# Logging configuration
logging.level.org.springframework=INFO
logging.level.cl.duoc.dsy1103.usuarios_microservice=DEBUG
logging.file.name=logs/users-service.log

