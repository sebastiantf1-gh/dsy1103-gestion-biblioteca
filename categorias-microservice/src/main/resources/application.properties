spring.application.name=categorias-microservice

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/db_categorias
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JPA configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Server configuration
server.port=8086
server.servlet.context-path=/api

# Logging configuration
logging.level.org.springframework=INFO
logging.level.cl.duoc.dsy1103.categorias_microservice=DEBUG
logging.file.name=logs/categorias-microservice.log

# Web client configuration
services.libros.url=http://localhost:8085/api

