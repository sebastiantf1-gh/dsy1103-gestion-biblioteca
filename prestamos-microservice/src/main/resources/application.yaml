spring:
  application:
    name: prestamos-microservice
  profiles:
    active: dev

  # Database configuration
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:db_prestamos}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Flyway configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # JPA configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

# Server configuration
server:
  port: 8089
  servlet:
    context-path: /api

# Logging configuration
logging:
  level:
    org.springframework: INFO
    cl.duoc.dsy1103.prestamos_microservice: DEBUG
  file:
    name: logs/prestamos-microservice.log

# Web client configuration
services:
  usuarios:
    url: ${USUARIOS_SERVICE_URL:http://localhost:8081/api}
  libros:
    url: ${LIBROS_SERVICE_URL:http://localhost:8085/api}

# JWT configuration
jwt:
  secret: a13644aa2a98114a0e84b4c35821263fd546c9e8fbeb73ccfc4dbbc68d530ed35bdd0df7ea742cd2c720ff20532addb20f1dbc092aa0636cae0da83b7ebcbc64

# Swagger
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html